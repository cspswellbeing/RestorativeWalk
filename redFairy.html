<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Fairy</title>
<style>
body, html {
margin: 0;
padding: 0;
height: 100%;
width: 100%;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background-color: black;
overflow: hidden;
font-family: Arial, sans-serif;
}
#station-image {
position: absolute;
top: 50%;
left: 50%;
max-width: 100%;
max-height: 100%;
transform: translate(-50%, -50%);
object-fit: contain;
z-index: 1;
}
#badge {
position: absolute;
width: 300px; /* adjust size as needed */
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
display: none; /* hidden by default */
z-index: 2;
}
#done-button {
position: absolute;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
padding: 15px 30px;
font-size: 20px;
background-color: #ff0000;
color: white;
border: none;
border-radius: 10px;
cursor: pointer;
z-index: 3;
}
#done-button:active {
background-color: #cc0000;
}
</style>
</head>
<body>

<!-- Full-screen Station Image -->
<img id="station-image" src="redFairyInstructions.png" alt="Red Station">

<!-- Badge Image (hidden initially) -->
<img id="badge" src="redFairyBadge.png" alt="Badge">

<!-- Done Button -->
<button id="done-button">Done</button>

<script>
const doneButton = document.getElementById('done-button');
const badge = document.getElementById('badge');

doneButton.addEventListener('click', () => {
badge.style.display = 'block'; // show the badge
doneButton.style.display = 'none'; // optionally hide the button after click
});
</script>

</body>

</html>
